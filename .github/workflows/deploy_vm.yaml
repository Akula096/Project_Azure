name: Deploy Azure Resources 

on:
    push:
        branches: [main]
        paths: 
            - terraform/**

permissions: 
    id-token: write
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v4

            - name: Azure Login 
              uses: azure/login@v3
              with:
                client-id: ${{ secrets.AZURE_CLIENT_ID }}
                tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            
            - name: set Terraform Auth
              run: |
                echo "ARM_USE_OICD=true" >> $GITHUB_ENV
                echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID}}" >> $GITHUB_ENV
            
            - name: Terraform Init
              run: |
                cd terraform
                teraaform validate
            - name: Terraform Plam
              run: |
                cd terraform
                terraform plan
            
            - name: Terraform Apply
              run: | 
                cd terraform
                terraform apply 
            
